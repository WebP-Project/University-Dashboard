<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Events - Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">
    <div class="login-bg-video-wrap" aria-hidden="true">
        <video class="login-bg-video" autoplay muted loop playsinline>
            <source src="https://www.pexels.com/download/video/7198205/" type="video/mp4">
        </video>
        <div class="login-bg-overlay"></div>
    </div>

    <div class="login-container">
        <div class="auth-switch" role="tablist" aria-label="Authentication mode">
            <button id="showLoginBtn" class="auth-switch-btn active-auth" type="button">Login</button>
            <button id="showSignupBtn" class="auth-switch-btn" type="button">Sign Up</button>
        </div>

        <form id="loginForm" class="login-form">
            <h2>University Event Portal</h2>
            <p>Please login to continue</p>
            
            <div class="input-group">
                <label for="email">College Email</label>
                <input type="email" id="email" required placeholder="name@college.edu">
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <div class="input-group">
                <label for="role">Login As</label>
                <select id="role">
                    <option value="student">Student</option>
                    <option value="admin">Faculty/Admin</option>
                </select>
            </div>

            <button type="submit" class="login-btn">Login</button>
            <p id="message" class="error-msg"></p>
        </form>

        <form id="signupForm" class="login-form hidden">
            <h2>Create Student Account</h2>
            <p>Sign up to browse and register for confirmed campus events.</p>

            <div class="input-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" required placeholder="Your full name">
            </div>

            <div class="input-group">
                <label for="signupEmail">College Email</label>
                <input type="email" id="signupEmail" required placeholder="name@college.edu">
            </div>

            <div class="input-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" required placeholder="Create a password">
            </div>

            <div class="input-group">
                <label for="signupStudentId">Student ID</label>
                <input type="text" id="signupStudentId" required placeholder="e.g. 23CSE102">
            </div>

            <div class="input-group">
                <label for="signupDepartment">Department</label>
                <input type="text" id="signupDepartment" required placeholder="e.g. Computer Science">
            </div>

            <button type="submit" class="login-btn">Create Account</button>
            <p id="signupMessage" class="error-msg"></p>
        </form>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
